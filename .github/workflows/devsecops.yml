name: "DevSecOps Pipeline - PAI4"

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:

  # ══════════════════════════════════════════════════════════════════════════════
  # Stage 1: BUILD
  # Instala dependencias y valida que el proyecto compila correctamente.
  # ══════════════════════════════════════════════════════════════════════════════
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Save node_modules to cache
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}

  # ══════════════════════════════════════════════════════════════════════════════
  # Stage 2: SCA — Software Composition Analysis
  # Herramienta: OWASP Dependency-Check
  # Detecta vulnerabilidades conocidas (CVEs) en dependencias de terceros.
  # ══════════════════════════════════════════════════════════════════════════════
  sca:
    name: "SCA - OWASP Dependency-Check"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Dependency-Check NVD database
        uses: actions/cache@v4
        with:
          path: /tmp/dc-data
          key: dc-nvd-${{ github.ref_name }}
          restore-keys: dc-nvd-

      - name: Create output directory for Dependency-Check
        run: mkdir -p reports/dependency-check

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "OWASP Juice Shop"
          path: "."
          format: "ALL"
          out: "reports/dependency-check"
          args: >
            --enableRetired
            --data /tmp/dc-data
            --failOnCVSS 11
        env:
          JAVA_HOME: /opt/jdk

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-dependency-check
          path: reports/dependency-check/
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════════
  # Stage 3: SAST — Static Application Security Testing
  # Herramienta: Semgrep
  # Analiza el código fuente estáticamente para detectar patrones vulnerables.
  # ══════════════════════════════════════════════════════════════════════════════
  sast:
    name: "SAST - Semgrep"
    needs: build
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep (auto ruleset)
        run: |
          semgrep \
            --config=auto \
            --json \
            --output=semgrep-report.json \
            --severity=ERROR \
            --severity=WARNING \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            . || true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-semgrep
          path: semgrep-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════════
  # Stage 4: Security IaC — Infrastructure as Code Security
  # Herramienta: Trivy
  # Detecta errores de configuración en Dockerfile, docker-compose y el sistema
  # de ficheros (secretos expuestos, dependencias vulnerables).
  # ══════════════════════════════════════════════════════════════════════════════
  iac-security:
    name: "Security IaC - Trivy"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy — Filesystem & secrets scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          output: "trivy-fs-report.json"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      - name: Trivy — IaC config scan (Dockerfile, docker-compose)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          format: "json"
          output: "trivy-config-report.json"
          exit-code: "0"

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iac-trivy
          path: |
            trivy-fs-report.json
            trivy-config-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════════
  # Stage 5: DAST — Dynamic Application Security Testing
  # Herramienta: OWASP ZAP (Baseline Scan)
  # Lanza la aplicación en un contenedor Docker y la escanea dinámicamente
  # en busca de vulnerabilidades en tiempo de ejecución (XSS, SQLi, etc.).
  # ══════════════════════════════════════════════════════════════════════════════
  dast:
    name: "DAST - OWASP ZAP"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Juice Shop via Docker
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop
          echo "Esperando a que Juice Shop arranque..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 3; done'
          echo "Juice Shop disponible en http://localhost:3000"

      - name: Fix workspace permissions for ZAP
        run: chmod a+w $GITHUB_WORKSPACE

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:3000"
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: false

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-zap
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════════
  # Stage 6: VULNERABILITY MANAGEMENT — DefectDojo
  # Consolida todos los informes de las etapas anteriores y los sube a DefectDojo
  # para gestión centralizada de vulnerabilidades.
  #
  # Requiere los siguientes secretos/variables en GitHub:
  #   vars.DEFECTDOJO_URL          → URL de la instancia DefectDojo
  #   vars.DEFECTDOJO_ENGAGEMENT_ID → ID del engagement en DefectDojo
  #   secrets.DEFECTDOJO_TOKEN     → API token de DefectDojo
  # ══════════════════════════════════════════════════════════════════════════════
  upload-to-defectdojo:
    name: "Vulnerability Management - DefectDojo"
    needs: [sca, sast, iac-security, dast]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all security reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Upload SCA (Dependency-Check) to DefectDojo
        if: ${{ vars.DEFECTDOJO_URL != '' }}
        run: |
          curl -s -X POST "${{ vars.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_TOKEN }}" \
            -H "ngrok-skip-browser-warning: true" \
            -F "scan_type=Dependency Check Scan" \
            -F "file=@reports/sca-dependency-check/dependency-check-report.xml" \
            -F "engagement=${{ vars.DEFECTDOJO_ENGAGEMENT_ID }}" \
            -F "verified=true" \
            -F "active=true" \
            -F "close_old_findings=true"
        continue-on-error: true

      - name: Upload SAST (Semgrep) to DefectDojo
        if: ${{ vars.DEFECTDOJO_URL != '' }}
        run: |
          curl -s -X POST "${{ vars.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_TOKEN }}" \
            -H "ngrok-skip-browser-warning: true" \
            -F "scan_type=Semgrep JSON Report" \
            -F "file=@reports/sast-semgrep/semgrep-report.json" \
            -F "engagement=${{ vars.DEFECTDOJO_ENGAGEMENT_ID }}" \
            -F "verified=true" \
            -F "active=true" \
            -F "close_old_findings=true"
        continue-on-error: true

      - name: Upload IaC (Trivy filesystem) to DefectDojo
        if: ${{ vars.DEFECTDOJO_URL != '' }}
        run: |
          curl -s -X POST "${{ vars.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_TOKEN }}" \
            -H "ngrok-skip-browser-warning: true" \
            -F "scan_type=Trivy Scan" \
            -F "file=@reports/iac-trivy/trivy-fs-report.json" \
            -F "engagement=${{ vars.DEFECTDOJO_ENGAGEMENT_ID }}" \
            -F "verified=true" \
            -F "active=true" \
            -F "close_old_findings=true"
        continue-on-error: true

      - name: Upload DAST (OWASP ZAP) to DefectDojo
        if: ${{ vars.DEFECTDOJO_URL != '' }}
        run: |
          curl -s -X POST "${{ vars.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_TOKEN }}" \
            -H "ngrok-skip-browser-warning: true" \
            -F "scan_type=ZAP Scan" \
            -F "file=@reports/dast-zap/report_json.json" \
            -F "engagement=${{ vars.DEFECTDOJO_ENGAGEMENT_ID }}" \
            -F "verified=true" \
            -F "active=true" \
            -F "close_old_findings=true"
        continue-on-error: true

      - name: Security summary
        if: always()
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║      DevSecOps Pipeline - Resumen        ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  SCA   → OWASP Dependency-Check          ║"
          echo "║  SAST  → Semgrep                         ║"
          echo "║  IaC   → Trivy                           ║"
          echo "║  DAST  → OWASP ZAP                       ║"
          echo "║  MGMT  → DefectDojo                      ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "Informes disponibles en los artefactos del workflow."
